image:
  name: hashicorp/terraform:latest
  entrypoint:
    - "/usr/bin/env"
    - "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

variables:
  # Instruct Terraform to skip checking if it's running in an interactive terminal
  TF_IN_AUTOMATION: "true"

stages:
  - plan
  - deploy
  - destroy

before_script:
  - apk add --no-cache bash curl python3 py3-pip
  - pip3 install --no-cache-dir azure-cli --break-system-packages
  - chmod +x deploy.sh
  - echo "Injecting SSH keys from CI/CD variables..."
  - echo "$SSH_PRIVATE_KEY" > azure-lamp-hosting/terraform/webadmin_rsa
  - echo "$SSH_PUBLIC_KEY" > azure-lamp-hosting/terraform/webadmin_rsa.pub
  - chmod 600 azure-lamp-hosting/terraform/webadmin_rsa

# ==================================================
# Plan Infrastructure automatically on 'develop'
# ==================================================
plan_infrastructure:
  stage: plan
  script:
    - echo "Executing plan script via CI/CD..."
    - ./deploy.sh plan
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

# ==================================================
# Deploy Infrastructure manually on 'develop'
# ==================================================
deploy_infrastructure:
  stage: deploy
  script:
    - echo "Executing deploy script via CI/CD..."
    - ./deploy.sh apply
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: manual
      allow_failure: true

# ==================================================
# Manual Destroy for cleanup
# ==================================================
destroy_infrastructure:
  stage: destroy
  script:
    - echo "Executing destroy script via CI/CD..."
    - ./deploy.sh destroy
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "develop" && $CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
